<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ind Traders – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e8b00;
      --green-dark: #236b00;
      --green-light: #3aaa00;
      --text-dark: #1a1a1a;
      --text-muted: #9ca3af;
      --border: #e5e7eb;
      --bg-input: #f3f4f6;
      --white: #ffffff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--green);
      font-style: italic;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--green); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .cart-icon {
      cursor: pointer;
      color: var(--text-dark);
      transition: color 0.2s;
    }
    .cart-icon:hover { color: var(--green); }

    .nav-login {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 24px;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .login-card h1 {
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    /* ── INPUTS ── */
    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 16px 16px 46px;
      background: var(--bg-input);
      border: 1px solid var(--bg-input);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrapper input::placeholder { color: var(--text-muted); }

    .input-wrapper input:focus {
      border-color: var(--green);
      background: #fff;
    }

    .eye-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 0;
    }
    .eye-btn:hover { color: var(--green); }

    /* ── FORGOT ── */
    .forgot {
      text-align: right;
      margin: -8px 0 28px;
    }

    .forgot a {
      color: var(--green);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 32px;
    }

    .btn-login:hover { background: var(--green-dark); }
    .btn-login:active { transform: scale(0.98); }

    /* ── FOOTER TEXT ── */
    .signup-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .signup-text a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
      margin-left: 4px;
    }
    .signup-text a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 14px 20px; }
      .nav-links { gap: 18px; }
      .nav-links a { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="#">Ind Traders</a>

    <ul class="nav-links">
      <li><a href="grocery home.html">Home</a></li>
      <li><a href="grocery login.html">Shop</a></li>
      <li><a href="grocery brand.html">Brand</a></li>
      <li><a href="grocery aboutus.html">AboutUs</a></li>
      <li><a href="grocery contact.html">Contact</a></li>
    </ul>
    <!-- Logo removed from beside Contact -->

    <div class="nav-right">


      <!-- Login link -->
      <a class="nav-login" href="grocery login.html">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Login
      </a>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <main>
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>

      <!-- Email -->
      <div class="input-wrapper">
        <span class="icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input type="email" placeholder="Email Address" autocomplete="email"/>
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <span class="icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </span>
        <input type="password" id="pwdInput" placeholder="Password" autocomplete="current-password"/>
        <button class="eye-btn" onclick="togglePwd()" type="button" aria-label="Toggle password">
          <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Forgot -->
      <div class="forgot"><a href="#">Forgot Password?</a></div>

      <!-- Submit -->
      <button class="btn-login" type="button">Log In</button>

      <!-- Sign up -->
      <p class="signup-text">
        Don't have an account?<a href="#">Create Account</a>
      </p>
    </div>
  </main>

  <script>
    function togglePwd() {
      const input = document.getElementById('pwdInput');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>
</body>
</html>
